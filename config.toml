[app]
title = "Tech News Digest"
timezone = "Asia/Shanghai"
limit = 10
scan_count = 40
database = "data/news.db"
output_dir = "out"

[filters]
fill_with_top = true
keywords = [
  "ai",
  "llm",
  "agent",
  "python",
  "linux",
  "security",
  "database",
  "postgres",
  "rust",
  "compiler",
  "cloud",
  "kubernetes",
  "open source",
  "self-hosted",
  "performance",
  "distributed",
]
min_score = 20
max_per_source = 3
priority_sources = ["Hacker News"]

[hacker_news]
enabled = true
api = "algolia"
list = "topstories"
timeout = 15
retries = 2

[feeds]
enabled = true
timeout = 8
retries = 1
per_feed_limit = 5

[aihot]
enabled = true
mode = "selected"
limit = 5
timeout = 10

[topics]
enabled = true
fill_with_top = true

[[topics.groups]]
name = "computer"
quota = 4
sources = [
  "Hacker News",
  "Lobsters",
  "GitHub Blog",
  "AWS Open Source",
  "OpenAI News",
  "Rust Blog",
  "Go Blog",
  "Kubernetes Blog",
  "Mozilla Hacks",
  "Meta Engineering",
  "CNCF Blog",
]
keywords = [
  "ai",
  "llm",
  "agent",
  "python",
  "linux",
  "security",
  "database",
  "postgres",
  "rust",
  "compiler",
  "cloud",
  "kubernetes",
  "open source",
  "self-hosted",
  "performance",
  "distributed",
]

[[topics.groups]]
name = "neuroscience"
quota = 2
sources = [
  "ScienceDaily / Neuroscience",
  "Neuroscience News",
  "Nature / Neuroscience",
  "Nature / Cognitive Neuroscience",
]
keywords = [
  "neuroscience",
  "brain",
  "cognitive",
  "neural",
  "memory",
  "synapse",
]

[[topics.groups]]
name = "diet"
quota = 2
sources = [
  "ScienceDaily / Nutrition",
  "Harvard Nutrition Source",
  "Nature / Nutrition",
]
keywords = [
  "nutrition",
  "diet",
  "food",
  "weight",
  "obesity",
  "metabolism",
]

[[topics.groups]]
name = "psychology"
quota = 2
sources = [
  "ScienceDaily / Psychology",
  "Psychology Today / Brain Myths",
  "Nature / Psychology",
]
keywords = [
  "psychology",
  "behavior",
  "mental",
  "emotion",
  "cognitive",
  "social",
]

